version: "3.9"

services:
  api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./weather.db:/app/weather.db
    restart: unless-stopped

  poller:
    build: .
    command: python -m app.poller
    env_file:
      - .env
    volumes:
      - ./weather.db:/app/weather.db
    restart: unless-stopped